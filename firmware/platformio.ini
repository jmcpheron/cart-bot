; Garage Kiva-Bot — kitchen tester firmware
;
;   pio test -e native            kinematics unit tests (runs on the Mac)
;   pio run  -e robot -t upload   flash the robot ESP32
;   pio run  -e transmitter -t upload   flash the second ESP32
;   pio device monitor            serial console, type `help`

[platformio]
default_envs = robot

[env]
monitor_speed = 115200

; Shared settings for both ESP32 targets (Arduino core 2.x — note the classic
; ledcSetup/ledcAttachPin API in motors.cpp assumes core 2.x)
[esp32_base]
platform = espressif32@^6.7.0
board = esp32dev
framework = arduino
build_flags = -Wall -Wextra
; Injects -DHOME_WIFI_SSID/-DHOME_WIFI_PASS from ../secrets.env (gitignored).
; Without the file, boards run AP-only exactly as before.
extra_scripts = pre:load_secrets.py

; Ports pinned so an unplugged board can never make auto-detect flash the
; wrong ESP32. Robot dev board = CH340 chip (port name follows USB location,
; usbserial-1x on the usual port); transmitter = CP2102 (stable serial 0001).
[env:robot]
extends = esp32_base
build_src_filter = +<robot/>
upload_port = /dev/cu.usbserial-1*
monitor_port = /dev/cu.usbserial-1*

[env:transmitter]
extends = esp32_base
build_src_filter = +<transmitter/>
upload_port = /dev/cu.usbserial-0001
monitor_port = /dev/cu.usbserial-0001

; Overhead tracking camera — bare AI-Thinker ESP32-CAM behind an FTDI FT232R.
; No auto-reset: jumper GPIO0→GND, press RESET, upload, remove jumper, RESET.
[env:camera]
extends = esp32_base
board = esp32cam
build_src_filter = +<camera/>
build_flags = ${esp32_base.build_flags} -DBOARD_HAS_PSRAM -mfix-esp32-psram-cache-issue
upload_port = /dev/cu.usbserial-A5069RR4
monitor_port = /dev/cu.usbserial-A5069RR4
upload_speed = 460800

; Host-run unit tests — compiles lib/kinematics with the Mac's toolchain,
; no hardware or ESP32 platform download needed.
[env:native]
platform = native
build_src_filter = -<*>
test_framework = unity
build_flags = -std=c++17 -Wall -Wextra
