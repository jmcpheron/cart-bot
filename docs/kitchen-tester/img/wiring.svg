<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 760" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="dot" markerWidth="6" markerHeight="6" refX="3" refY="3">
      <circle cx="3" cy="3" r="2.2" fill="#212121"/>
    </marker>
  </defs>

  <rect width="940" height="760" fill="#ffffff"/>
  <text x="470" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#212121">cart-bot kitchen tester — wiring (viewed from above) · FRONT ▲</text>

  <!-- ══ Wheels (roller lean forms the X pattern) ══ -->
  <!-- FL wheel: rollers lean \ -->
  <g stroke="#9e9e9e" stroke-width="2">
    <rect x="8"   y="62"  width="24" height="84" rx="5" fill="#eeeeee"/>
    <line x1="12" y1="76"  x2="28" y2="92"/><line x1="12" y1="96"  x2="28" y2="112"/><line x1="12" y1="116" x2="28" y2="132"/>
    <!-- FR wheel: rollers lean / -->
    <rect x="908" y="62"  width="24" height="84" rx="5" fill="#eeeeee"/>
    <line x1="912" y1="92"  x2="928" y2="76"/><line x1="912" y1="112" x2="928" y2="96"/><line x1="912" y1="132" x2="928" y2="116"/>
    <!-- RL wheel: rollers lean / -->
    <rect x="8"   y="592" width="24" height="84" rx="5" fill="#eeeeee"/>
    <line x1="12" y1="622" x2="28" y2="606"/><line x1="12" y1="642" x2="28" y2="626"/><line x1="12" y1="662" x2="28" y2="646"/>
    <!-- RR wheel: rollers lean \ -->
    <rect x="908" y="592" width="24" height="84" rx="5" fill="#eeeeee"/>
    <line x1="912" y1="606" x2="928" y2="622"/><line x1="912" y1="626" x2="928" y2="642"/><line x1="912" y1="646" x2="928" y2="662"/>
  </g>

  <!-- ══ Motors ══ -->
  <g fill="#f5f5f5" stroke="#424242" stroke-width="1.5">
    <rect x="40"  y="72"  width="150" height="64" rx="6"/>
    <rect x="750" y="72"  width="150" height="64" rx="6"/>
    <rect x="40"  y="602" width="150" height="64" rx="6"/>
    <rect x="750" y="602" width="150" height="64" rx="6"/>
  </g>
  <g font-size="12" fill="#212121" text-anchor="middle" font-weight="bold">
    <text x="115" y="99">FL motor</text><text x="825" y="99">FR motor</text>
    <text x="115" y="629">RL motor</text><text x="825" y="629">RR motor</text>
  </g>
  <g font-size="9" fill="#616161" text-anchor="middle">
    <text x="115" y="116">TT 1:48 · rollers \</text><text x="825" y="116">TT 1:48 · rollers /</text>
    <text x="115" y="646">TT 1:48 · rollers /</text><text x="825" y="646">TT 1:48 · rollers \</text>
  </g>

  <!-- ══ Board A (front) ══ -->
  <rect x="330" y="60" width="280" height="140" rx="6" fill="#fff8e1" stroke="#424242" stroke-width="1.5"/>
  <text x="470" y="82" text-anchor="middle" font-size="13" font-weight="bold" fill="#212121">L298N — Board A (front)</text>
  <text x="470" y="98" text-anchor="middle" font-size="9" fill="#616161">ENA/ENB jumpers OFF · 5V-EN jumper ON</text>
  <!-- OUT pads -->
  <g font-size="9" fill="#212121">
    <circle cx="330" cy="100" r="3" fill="#7b1fa2"/><text x="338" y="103">OUT1</text>
    <circle cx="330" cy="125" r="3" fill="#7b1fa2"/><text x="338" y="128">OUT2</text>
    <circle cx="610" cy="100" r="3" fill="#7b1fa2"/><text x="602" y="103" text-anchor="end">OUT3</text>
    <circle cx="610" cy="125" r="3" fill="#7b1fa2"/><text x="602" y="128" text-anchor="end">OUT4</text>
  </g>
  <!-- power + signal pads on bottom edge -->
  <g font-size="8" fill="#212121" text-anchor="middle">
    <circle cx="350" cy="200" r="3" fill="#c62828"/><text x="350" y="193">12V</text>
    <circle cx="385" cy="200" r="3" fill="#212121"/><text x="385" y="193">GND</text>
    <circle cx="420" cy="200" r="3" fill="#ef6c00"/><text x="420" y="193">5V</text>
    <circle cx="470" cy="200" r="3" fill="#1565c0"/><text x="470" y="193">IN1</text>
    <circle cx="495" cy="200" r="3" fill="#1565c0"/><text x="495" y="193">IN2</text>
    <circle cx="520" cy="200" r="3" fill="#1565c0"/><text x="520" y="193">ENA</text>
    <circle cx="545" cy="200" r="3" fill="#1565c0"/><text x="545" y="193">IN3</text>
    <circle cx="570" cy="200" r="3" fill="#1565c0"/><text x="570" y="193">IN4</text>
    <circle cx="595" cy="200" r="3" fill="#1565c0"/><text x="595" y="193">ENB</text>
  </g>

  <!-- ══ Board B (rear) ══ -->
  <rect x="330" y="560" width="280" height="140" rx="6" fill="#e8f5e9" stroke="#424242" stroke-width="1.5"/>
  <text x="470" y="688" text-anchor="middle" font-size="13" font-weight="bold" fill="#212121">L298N — Board B (rear)</text>
  <text x="470" y="672" text-anchor="middle" font-size="9" fill="#616161">ENA/ENB jumpers OFF · 5V-EN jumper ON</text>
  <g font-size="9" fill="#212121">
    <circle cx="330" cy="610" r="3" fill="#7b1fa2"/><text x="338" y="613">OUT1</text>
    <circle cx="330" cy="635" r="3" fill="#7b1fa2"/><text x="338" y="638">OUT2</text>
    <circle cx="610" cy="610" r="3" fill="#7b1fa2"/><text x="602" y="613" text-anchor="end">OUT3</text>
    <circle cx="610" cy="635" r="3" fill="#7b1fa2"/><text x="602" y="638" text-anchor="end">OUT4</text>
  </g>
  <!-- power + signal pads on top edge -->
  <g font-size="8" fill="#212121" text-anchor="middle">
    <circle cx="350" cy="560" r="3" fill="#c62828"/><text x="350" y="573">12V</text>
    <circle cx="385" cy="560" r="3" fill="#212121"/><text x="385" y="573">GND</text>
    <circle cx="470" cy="560" r="3" fill="#2e7d32"/><text x="470" y="573">IN1</text>
    <circle cx="495" cy="560" r="3" fill="#2e7d32"/><text x="495" y="573">IN2</text>
    <circle cx="520" cy="560" r="3" fill="#2e7d32"/><text x="520" y="573">ENA</text>
    <circle cx="545" cy="560" r="3" fill="#2e7d32"/><text x="545" y="573">IN3</text>
    <circle cx="570" cy="560" r="3" fill="#2e7d32"/><text x="570" y="573">IN4</text>
    <circle cx="595" cy="560" r="3" fill="#2e7d32"/><text x="595" y="573">ENB</text>
  </g>

  <!-- ══ ESP32 ══ -->
  <rect x="360" y="330" width="250" height="150" rx="6" fill="#e3f2fd" stroke="#424242" stroke-width="1.5"/>
  <text x="485" y="398" text-anchor="middle" font-size="14" font-weight="bold" fill="#212121">ESP32 (robot)</text>
  <text x="485" y="415" text-anchor="middle" font-size="9" fill="#616161">WROOM-32 38-pin · USB for bench/flash</text>
  <!-- GPIO pads top (front) / bottom (rear), power pads left -->
  <g font-size="8" fill="#1565c0" text-anchor="middle">
    <text x="470" y="345">25</text><text x="495" y="345">26</text><text x="520" y="345">27</text>
    <text x="545" y="345">16</text><text x="570" y="345">17</text><text x="595" y="345">4</text>
  </g>
  <g font-size="8" fill="#2e7d32" text-anchor="middle">
    <text x="470" y="474">33</text><text x="495" y="474">32</text><text x="520" y="474">23</text>
    <text x="545" y="474">19</text><text x="570" y="474">18</text><text x="595" y="474">21</text>
  </g>
  <g font-size="8" fill="#212121">
    <circle cx="360" cy="380" r="3"/><text x="368" y="383">GND</text>
    <circle cx="360" cy="430" r="3" fill="#ef6c00"/><text x="368" y="433" fill="#ef6c00">VIN</text>
  </g>

  <!-- ══ Front signal wires (blue) ══ -->
  <g stroke="#1565c0" stroke-width="2">
    <line x1="470" y1="203" x2="470" y2="330"/><line x1="495" y1="203" x2="495" y2="330"/>
    <line x1="520" y1="203" x2="520" y2="330"/><line x1="545" y1="203" x2="545" y2="330"/>
    <line x1="570" y1="203" x2="570" y2="330"/><line x1="595" y1="203" x2="595" y2="330"/>
  </g>
  <g font-size="9" fill="#1565c0" text-anchor="middle">
    <text x="470" y="250" transform="rotate(-90 470 250)">GPIO 25</text>
    <text x="495" y="290" transform="rotate(-90 495 290)">GPIO 26</text>
    <text x="520" y="250" transform="rotate(-90 520 250)">GPIO 27</text>
    <text x="545" y="290" transform="rotate(-90 545 290)">GPIO 16</text>
    <text x="570" y="250" transform="rotate(-90 570 250)">GPIO 17</text>
    <text x="595" y="290" transform="rotate(-90 595 290)">GPIO 4</text>
  </g>

  <!-- ══ Rear signal wires (green) ══ -->
  <g stroke="#2e7d32" stroke-width="2">
    <line x1="470" y1="480" x2="470" y2="557"/><line x1="495" y1="480" x2="495" y2="557"/>
    <line x1="520" y1="480" x2="520" y2="557"/><line x1="545" y1="480" x2="545" y2="557"/>
    <line x1="570" y1="480" x2="570" y2="557"/><line x1="595" y1="480" x2="595" y2="557"/>
  </g>
  <g font-size="9" fill="#2e7d32" text-anchor="middle">
    <text x="470" y="505" transform="rotate(-90 470 505)">GPIO 33</text>
    <text x="495" y="532" transform="rotate(-90 495 532)">GPIO 32</text>
    <text x="520" y="505" transform="rotate(-90 520 505)">GPIO 23</text>
    <text x="545" y="532" transform="rotate(-90 545 532)">GPIO 19</text>
    <text x="570" y="505" transform="rotate(-90 570 505)">GPIO 18</text>
    <text x="595" y="532" transform="rotate(-90 595 532)">GPIO 21</text>
  </g>

  <!-- ══ Motor wires (purple) ══ -->
  <g stroke="#7b1fa2" stroke-width="2" fill="none">
    <line x1="190" y1="100" x2="330" y2="100"/><line x1="190" y1="125" x2="330" y2="125"/>
    <line x1="610" y1="100" x2="750" y2="100"/><line x1="610" y1="125" x2="750" y2="125"/>
    <line x1="190" y1="610" x2="330" y2="610"/><line x1="190" y1="635" x2="330" y2="635"/>
    <line x1="610" y1="610" x2="750" y2="610"/><line x1="610" y1="635" x2="750" y2="635"/>
  </g>

  <!-- ══ Battery ══ -->
  <rect x="60" y="330" width="150" height="90" rx="6" fill="#ffebee" stroke="#c62828" stroke-width="1.5"/>
  <text x="135" y="365" text-anchor="middle" font-size="12" font-weight="bold" fill="#212121">2S LiPo 7.4V</text>
  <text x="135" y="382" text-anchor="middle" font-size="10" fill="#616161">1000mAh 35C · JST</text>
  <text x="135" y="400" text-anchor="middle" font-size="9" fill="#c62828">check polarity before connecting!</text>

  <!-- battery + rail (red): to A.12V and B.12V -->
  <g stroke="#c62828" stroke-width="2.5" fill="none">
    <polyline points="210,350 300,350 300,225 350,225 350,203"/>
    <polyline points="300,350 300,530 350,530 350,563"/>
  </g>
  <circle cx="300" cy="350" r="3" fill="#c62828"/>
  <!-- ground rail (black): to A.GND, B.GND, ESP32 GND -->
  <g stroke="#212121" stroke-width="2.5" fill="none">
    <polyline points="210,395 280,395 280,245 385,245 385,203"/>
    <polyline points="280,395 280,545 385,545 385,563"/>
    <polyline points="280,380 357,380"/>
  </g>
  <circle cx="280" cy="395" r="3" fill="#212121"/>
  <circle cx="280" cy="380" r="3" fill="#212121"/>
  <!-- bulk cap across red/black rails near Board A -->
  <g stroke="#212121" stroke-width="2">
    <line x1="322" y1="225" x2="322" y2="231"/>
    <line x1="314" y1="231" x2="330" y2="231"/>
    <line x1="314" y1="237" x2="330" y2="237"/>
    <line x1="322" y1="237" x2="322" y2="245"/>
  </g>
  <circle cx="322" cy="225" r="2.5" fill="#c62828"/>
  <circle cx="322" cy="245" r="2.5" fill="#212121"/>
  <text x="248" y="222" font-size="8" fill="#616161">470–1000µF</text>
  <text x="248" y="232" font-size="8" fill="#616161">bulk cap</text>
  <text x="248" y="242" font-size="8" fill="#616161">(− to GND)</text>

  <!-- 5V link (orange dashed): A.5V -> ESP32 VIN -->
  <g stroke="#ef6c00" stroke-width="2" stroke-dasharray="6 4" fill="none">
    <polyline points="420,203 420,262 335,262 335,430 357,430"/>
  </g>
  <text x="230" y="278" font-size="9" fill="#ef6c00" font-weight="bold">5V → VIN: untethered only,</text>
  <text x="230" y="290" font-size="9" fill="#ef6c00" font-weight="bold">NEVER together with USB</text>

  <!-- ══ Legend ══ -->
  <g font-size="10" fill="#212121">
    <rect x="660" y="330" width="250" height="150" rx="6" fill="#fafafa" stroke="#bdbdbd"/>
    <text x="672" y="352" font-weight="bold" font-size="11">Legend</text>
    <line x1="672" y1="366" x2="704" y2="366" stroke="#c62828" stroke-width="2.5"/><text x="712" y="370">battery + (18–20 AWG)</text>
    <line x1="672" y1="386" x2="704" y2="386" stroke="#212121" stroke-width="2.5"/><text x="712" y="390">ground bus (star at Board A)</text>
    <line x1="672" y1="406" x2="704" y2="406" stroke="#1565c0" stroke-width="2"/><text x="712" y="410">front signals (Dupont)</text>
    <line x1="672" y1="426" x2="704" y2="426" stroke="#2e7d32" stroke-width="2"/><text x="712" y="430">rear signals (Dupont)</text>
    <line x1="672" y1="446" x2="704" y2="446" stroke="#7b1fa2" stroke-width="2"/><text x="712" y="450">motor leads</text>
    <line x1="672" y1="466" x2="704" y2="466" stroke="#ef6c00" stroke-width="2" stroke-dasharray="6 4"/><text x="712" y="470">5V link (untethered only)</text>
  </g>

  <!-- X-pattern reminder -->
  <text x="470" y="735" text-anchor="middle" font-size="11" fill="#212121" font-weight="bold">Mecanum check: roller axes seen from above form an X  —  FL \   FR /   ·   RL /   RR \</text>
  <text x="470" y="751" text-anchor="middle" font-size="9" fill="#616161">On each wheel, the roller touching the ground points its axis at the robot's center. Wrong pattern = robot vibrates instead of strafing.</text>
</svg>
